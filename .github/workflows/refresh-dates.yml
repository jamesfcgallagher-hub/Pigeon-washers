name: Refresh availability dates

on:
  # Runs every Monday at 2:00am NZT (1:00pm UTC Sunday)
  schedule:
    - cron: '0 13 * * 0'

  # Deploy automatically whenever main is updated
  push:
    branches:
      - main

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the updated index.html
      pages: write      # needed to deploy to GitHub Pages
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate availability dates
        run: python update_dates.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: refresh availability dates $(date +'%d %b %Y')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
